# docker-compose.yml - defines and runs multiple containers together
# as one unit. Each top-level entry under `services:` becomes one
# container. Compose automatically creates a shared network so these
# containers can reach each other BY SERVICE NAME (e.g. our Prometheus
# container reaching "app:8000" - see prometheus.yml's comment on this).

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      # MYSQL_ROOT_PASSWORD is required by this image on first startup
      # - it's separate from our app's own DB_USER/DB_PASSWORD below,
      # similar in spirit to how your Mac's MySQL has a root account
      # distinct from the 'vicky' app account we created earlier.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      # A NAMED VOLUME (mysql-data, defined at the bottom of this
      # file) - Docker manages this storage separately from the
      # container itself. Without this, recreating the mysql
      # container (e.g. `docker compose up --build`) would wipe the
      # database every time, since a fresh container normally starts
      # with empty storage. The named volume persists independently
      # of the container's lifecycle - this is the EC2 equivalent of
      # what your local MySQL install already gave you for free
      # (data living outside any one running process).
      - mysql-data:/var/lib/mysql
      # Mounting our schema file into the special initdb.d path -
      # see mysql-init/01-schema.sql's comment for how this works.
      - ./mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      # MySQL's container reports "started" well before it's actually
      # ready to accept connections - the process is running, but the
      # database engine inside it is still initializing. Without this
      # healthcheck, "app" could start and try to connect within that
      # gap and fail. mysqladmin ping is MySQL's own built-in way of
      # asking "are you actually ready yet", and depends_on below
      # uses this result rather than just "has the process started".
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    # build: . tells Compose to build the image from our Dockerfile
    # in the current folder, rather than pulling a pre-built image
    # from somewhere - same as our earlier `docker build` command,
    # just driven from this file now instead of typed by hand.
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Now pointing at the "mysql" service by its Compose service
      # name, since MySQL is also a container in this same Compose
      # network now - no more host.docker.internal needed, since
      # we're not reaching out to the host machine's MySQL anymore.
      DB_HOST: mysql
    depends_on:
      mysql:
        # Wait for the healthcheck above to pass, not just for the
        # mysql container process to start - this is the fix for the
        # "started but not ready" gap described above.
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      # Mount our local prometheus.yml INTO the container at the path
      # Prometheus expects its config file. ":ro" means read-only -
      # the container can read this file but can't modify our copy
      # of it, which is the appropriate direction for a config file.
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      # Sets Grafana's admin password directly via environment
      # variable, so we don't have to click through a "set new
      # password" wizard on first login. Fine for local development;
      # a production setup would handle this more carefully (e.g.
      # via secrets management).
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

# Named volumes are declared here at the top level, then referenced
# by name in a service's `volumes:` list above. Docker creates and
# manages the actual storage location on disk for us, separate from
# any single container's lifecycle.
volumes:
  mysql-data:
